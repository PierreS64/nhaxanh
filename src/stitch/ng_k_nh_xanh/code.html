<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7f9fb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-background {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .auth-card {
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }
        input:focus {
            box-shadow: 0 0 0 4px rgba(0, 44, 102, 0.1);
        }
        .role-radio:checked + label {
            border-color: #002c66;
            background-color: rgba(0, 44, 102, 0.04);
            color: #002c66;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<main class="flex-grow flex items-center justify-center px-gutter py-stack-lg relative overflow-hidden">
<!-- Abstract Background Shapes -->
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-tertiary-fixed opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary-fixed opacity-30 blur-[100px] rounded-full"></div>
<div class="w-full max-w-[480px] z-10">
<!-- Brand Anchor -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Nhà Xanh</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Bắt đầu hành trình tìm kiếm không gian sống lý tưởng.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest auth-card rounded-xl p-8 md:p-10">
<header class="mb-stack-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Đăng ký tài khoản</h2>
<p class="font-body-md text-body-md text-outline">Vui lòng điền thông tin để tiếp tục.</p>
</header>
<form class="space-y-6" id="registrationForm">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="fullName">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-bright border border-outline-variant rounded-lg text-on-surface font-body-md focus:border-primary focus:ring-0 transition-all outline-none" id="fullName" placeholder="Nguyễn Văn A" required="" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="phoneNumber">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">call</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-bright border border-outline-variant rounded-lg text-on-surface font-body-md focus:border-primary focus:ring-0 transition-all outline-none" id="phoneNumber" placeholder="090 123 4567" required="" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-bright border border-outline-variant rounded-lg text-on-surface font-body-md focus:border-primary focus:ring-0 transition-all outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Role Selector -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block">Vai trò</label>
<div class="grid grid-cols-2 gap-3">
<div>
<input checked="" class="hidden role-radio" id="role-tenant" name="role" type="radio" value="tenant"/>
<label class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg cursor-pointer hover:border-primary transition-all text-on-surface-variant" for="role-tenant">
<span class="material-symbols-outlined mb-1">home_pin</span>
<span class="font-label-md text-label-md">Người thuê</span>
</label>
</div>
<div>
<input class="hidden role-radio" id="role-landlord" name="role" type="radio" value="landlord"/>
<label class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg cursor-pointer hover:border-primary transition-all text-on-surface-variant" for="role-landlord">
<span class="material-symbols-outlined mb-1">real_estate_agent</span>
<span class="font-label-md text-label-md">Chủ nhà</span>
</label>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md py-4 rounded-lg shadow-sm hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                        Đăng ký
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center border-t border-surface-container pt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Đã có tài khoản? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng nhập</a>
</p>
</div>
</div>
<!-- Social Auth Divider -->
<div class="flex items-center my-6">
<div class="flex-grow border-t border-outline-variant opacity-30"></div>
<span class="px-4 font-label-md text-label-md text-outline">Hoặc đăng ký bằng</span>
<div class="flex-grow border-t border-outline-variant opacity-30"></div>
</div>
<!-- Social Auth Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container transition-colors">
<img alt="Google" class="w-5 h-5 grayscale hover:grayscale-0 transition-all" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAz4Hys5E7ezfSZvaNeH7snVzsVKw--JIb0H6WEB7PFvq-idDXqOshu-uzikUkMqlnRjBMZ-LRoRC12e2TjhDlMtJdApO_7ZGyiNyrdEh1j9XTVDONKx7vnNZCCBmiD8kjJVSq1Jc-wEeZmLtWJkJ4oQeauJaI3f9ayc8jzFzv8MkYMPHuuKOZKhMmUXBndVD9mD4HDpuu2D1lMzYyWDv7BiK4nj1vgA0wLcLyDaLw_1RDHYWWSghJX715lIkAEvB2IBFW5Zs161hU"/>
<span class="font-label-md text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[#1877F2]">social_leaderboard</span>
<span class="font-label-md text-on-surface">Facebook</span>
</button>
</div>
</div>
</main>
<!-- Shared Footer from JSON -->
<footer class="w-full bg-surface-container-low dark:bg-inverse-surface border-t border-outline-variant/10">
<div class="flex flex-col md:flex-row justify-between items-center py-stack-lg px-gutter max-w-container-max mx-auto">
<div class="mb-4 md:mb-0">
<span class="font-headline-sm text-primary">Nhà Xanh</span>
</div>
<div class="flex flex-wrap justify-center gap-6 mb-4 md:mb-0">
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Contact Support</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Careers</a>
</div>
<p class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant">© 2024 Nhà Xanh Vietnam. All rights reserved.</p>
</div>
</footer>
<script>
        // Password Visibility Toggle
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        });

        // Simple form animation
        const form = document.getElementById('registrationForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Đang xử lý...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Thành công';
                btn.classList.replace('bg-primary', 'bg-green-600');
            }, 1500);
        });
    </script>
</body></html>
