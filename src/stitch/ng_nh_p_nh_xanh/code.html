<!DOCTYPE html>

<html lang="vi"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .architectural-pattern {
            background-color: #f7f9fb;
            background-image: radial-gradient(#c3c6d2 0.5px, transparent 0.5px), radial-gradient(#c3c6d2 0.5px, #f7f9fb 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.4;
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c3c6d2",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#191c1e",
                        "inverse-surface": "#2d3133",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-fixed": "#ffdad7",
                        "background": "#f7f9fb",
                        "surface-container-high": "#e6e8ea",
                        "inverse-primary": "#adc6ff",
                        "tertiary-fixed": "#d8e2ff",
                        "on-background": "#191c1e",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#004190",
                        "on-primary-fixed-variant": "#14448c",
                        "tertiary": "#002c65",
                        "primary": "#002c66",
                        "surface-dim": "#d8dadc",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container": "#eceef0",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#8cb1ff",
                        "secondary-container": "#db3336",
                        "secondary": "#b71421",
                        "outline": "#737782",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface-variant": "#434751",
                        "error-container": "#ffdad6",
                        "primary-container": "#10428a",
                        "surface-tint": "#345da6",
                        "on-secondary-fixed-variant": "#930013",
                        "on-tertiary-fixed": "#001a42",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed-dim": "#ffb3ad",
                        "on-tertiary-fixed-variant": "#004395",
                        "surface": "#f7f9fb",
                        "primary-fixed-dim": "#adc6ff",
                        "on-secondary-fixed": "#410004",
                        "on-primary-container": "#8cb1ff",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed": "#001a42",
                        "surface-bright": "#f7f9fb",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.8px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1.5rem",
                        "margin-page": "2rem",
                        "container-max": "1200px",
                        "stack-md": "1rem",
                        "stack-sm": "0.5rem",
                        "stack-lg": "2rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {

                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],

                        "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}]
                    }
                },
            },
        }

</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Bar (Always Visible Anchor) -->
<nav class="w-full top-0 bg-surface dark:bg-on-surface shadow-sm z-50">
<div class="flex justify-between items-center h-16 px-gutter max-w-container-max mx-auto">
<div class="text-headline-sm font-headline-sm text-primary dark:text-primary-fixed-dim">
                Nhà Xanh
            </div>
<div class="hidden md:flex space-x-8">
<a class="font-body-lg text-body-lg text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors cursor-pointer active:opacity-80" href="#">Home</a>
<a class="font-body-lg text-body-lg text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors cursor-pointer active:opacity-80" href="#">Properties</a>
<a class="font-body-lg text-body-lg text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors cursor-pointer active:opacity-80" href="#">Rentals</a>
<a class="font-body-lg text-body-lg text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors cursor-pointer active:opacity-80" href="#">About</a>
</div>
<div class="flex items-center gap-4">
<button class="font-body-lg text-body-lg text-primary dark:text-primary-fixed-dim border-b-2 border-primary pb-1 cursor-pointer active:opacity-80">Sign In</button>
</div>
</div>
</nav>
<!-- Main Content: Login Section -->
<main class="flex-grow flex items-center justify-center relative overflow-hidden px-gutter">
<!-- Background Decoration -->
<div class="absolute inset-0 architectural-pattern pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Login Card -->
<div class="relative z-10 w-full max-w-[450px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant p-10">
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Chào mừng trở lại</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Vui lòng đăng nhập để tiếp tục quản lý nhà của bạn</p>
</div>
<form action="#" class="space-y-6">
<!-- Phone Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="phone">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">call</span>
<input class="w-full pl-12 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 placeholder:text-outline-variant text-body-lg font-body-lg" id="phone" name="phone" placeholder="090 123 4567" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="password">Mật khẩu</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-white border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 placeholder:text-outline-variant text-body-lg font-body-lg" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary transition-all" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-headline-sm py-4 rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Đăng nhập
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="relative my-8 text-center">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
<span class="relative px-4 bg-surface-container-lowest text-label-md text-outline font-label-md">HOẶC TIẾP TỤC VỚI</span>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg hover:bg-surface transition-all active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" data-alt="A high-quality, professional render of the Google 'G' icon with vibrant primary colors. The lighting is soft and corporate, reflecting a modern light-mode interface aesthetic. The background is a clean, minimalist white surface that feels premium and technologically advanced." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVFcWU84SzObuNQuIodeLH5j_PvHI2SLlMKluhRgNYmDEnuHzMDBP1lLgCxkBwFyny6Baqvd_5o3oyt-NL30CqGl01dhLqQ1oZNRZcKvh68FvaUGVVzC2hp9riNMW-vMMA5HrTuPaAZgbSH71Q0BSWfrJGJ3vZ2utTjqqz-I3Y1KhBfzTVnkjaU5vPpA-POYhhY1bDbwFs2iXyPGEffWWSQGIgKO0NgZMmxh-W96VWfBGNIt7veSFws4h0BOhdZa4RvgBmfjtuiYo"/>
<span class="font-label-md text-label-md text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg hover:bg-surface transition-all active:scale-[0.98]">
<img alt="Facebook" class="w-5 h-5" data-alt="A sharp, clear rendering of the Facebook logo set against a clean, professional corporate background. The scene is illuminated by gentle studio lighting, emphasizing a modern light-mode design language. The color palette is composed of soft whites and the signature blue, evoking trust and clarity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuVY57VXtO862XxqenuEAHfnFhZ_QpS29M4kfF_0MyaS2Vi-rWJUC4kGCbE01OEPZ7Nm7d6wzQvFjNFzOYx2SYksU_n-Ml5E3UVeSCcrV4VC4-YDzZQQyIz2IT5A0Zd-3u3TY9stpS9oEuqdIpmR_eMU-BXJ3EcSR77dQi22PHHEAGQea_QQtpnhY3LjVpTIsr3_M0lU9LYPN6CpBfLaqVsNse8aAPwwg7P7NmlM7NSq89OUakTIdCPpR1bRR6lkfZzwbBCG3GT_w"/>
<span class="font-label-md text-label-md text-on-surface-variant">Facebook</span>
</button>
</div>
<!-- Register Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Chưa có tài khoản? 
                    <a class="text-secondary font-bold hover:underline transition-all" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full bg-surface-container-low dark:bg-inverse-surface">
<div class="flex flex-col md:flex-row justify-between items-center py-stack-lg px-gutter max-w-container-max mx-auto">
<div class="font-headline-sm text-primary mb-4 md:mb-0">Nhà Xanh</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Contact Support</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:underline text-primary transition-all duration-200" href="#">Careers</a>
</div>
<div class="mt-4 md:mt-0 font-label-md text-label-md text-on-surface-variant dark:text-outline-variant">
                © 2024 Nhà Xanh Vietnam. All rights reserved.
            </div>
</div>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Add a subtle parallax effect to the architectural background
        document.addEventListener('mousemove', (e) => {
            const pattern = document.querySelector('.architectural-pattern');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            pattern.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
        });
    </script>
</body></html>
